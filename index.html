<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiranLingo Elite V5</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --green: #58cc02; --blue: #1cb0f6; --red: #ff4b4b; --purple: #a855f7;
            --white: #ffffff; --bg: #f0f2f5;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden;
            background: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
            display: flex; justify-content: center; height: 100vh;
        }

        .app { width: 100%; max-width: 420px; padding: 20px; display: flex; flex-direction: column; position: relative; }

        /* Üst Panel */
        .stats { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; z-index: 10; }
        .stat-pill { background: white; padding: 5px 15px; border-radius: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }

        /* Zaman Barı */
        .timer-cont { width: 100%; height: 10px; background: #ddd; border-radius: 5px; margin: 15px 0; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: var(--blue); transition: width 0.1s linear; }

        /* Soru Kartı */
        .card { 
            background: white; border-radius: 25px; padding: 40px 20px; text-align: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); margin-bottom: 25px;
            animation: cardEnter 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes cardEnter { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .q-text { font-size: 38px; font-weight: 900; color: #333; margin: 0; }
        .level-tag { color: var(--purple); font-size: 14px; font-weight: bold; margin-bottom: 10px; display: block; }

        /* Şıklar */
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { 
            background: white; border: 2px solid #e5e5e5; border-bottom: 5px solid #e5e5e5;
            border-radius: 18px; padding: 18px 10px; font-size: 17px; font-weight: bold;
            cursor: pointer; transition: 0.1s; color: #4b4b4b;
        }
        .opt:active { transform: translateY(3px); border-bottom-width: 2px; }
        .correct { background: var(--green) !important; color: white !important; border-color: #46a302 !important; }
        .wrong { background: var(--red) !important; color: white !important; border-color: #c0392b !important; }

        /* Joker ve Özel Butonlar */
        .joker-btn { 
            margin-top: 20px; background: var(--purple); color: white; border: none; 
            padding: 12px; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #7e22ce;
        }
        .joker-btn:disabled { background: #ccc; box-shadow: none; transform: none; opacity: 0.6; }

        /* Combo Efekti */
        #combo-msg { 
            position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            font-size: 40px; font-weight: 900; color: var(--purple); pointer-events: none; opacity: 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2); z-index: 100;
        }
        .pop { animation: popAnim 0.6s ease-out; }
        @keyframes popAnim { 0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); } 100% { opacity: 0; transform: translate(-50%, -70%) scale(1.5); } }

        .hidden { display: none !important; }
        .full-screen { position: fixed; inset: 0; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
    </style>
</head>
<body>

<div id="combo-msg">HARİKA!</div>

<div class="app">
    <div id="start-ui" class="full-screen">
        <h1 style="color: var(--green); font-size: 45px; margin-bottom: 10px;">MiranLingo</h1>
        <p style="color: #666; margin-bottom: 30px;">LGS İngilizce Canavarı Ol!</p>
        <div style="background: #f7f7f7; padding: 20px; border-radius: 20px; margin-bottom: 30px; width: 80%;">
            <p>🏆 En Yüksek Skor: <b id="hs-val">0</b></p>
        </div>
        <button onclick="startGame()" style="background: var(--green); color: white; border: none; padding: 20px 60px; border-radius: 20px; font-size: 24px; font-weight: 900; cursor: pointer; box-shadow: 0 8px 0 #46a302;">BAŞLA</button>
    </div>

    <div id="game-ui" class="hidden">
        <div class="stats">
            <div class="stat-pill" style="color: orange;">🔥 <span id="streak">0</span></div>
            <div class="stat-pill" id="level-pill">Lv. 1</div>
            <div class="stat-pill" style="color: var(--blue);">💎 <span id="score">0</span></div>
        </div>

        <div class="timer-cont"><div id="timer-bar"></div></div>

        <div class="card">
            <span class="level-tag" id="q-count">Soru 1/44</span>
            <h2 class="q-text" id="target-word">Apple</h2>
        </div>

        <div class="options" id="opt-grid">
            <button class="opt">A</button>
            <button class="opt">B</button>
            <button class="opt">C</button>
            <button class="opt">D</button>
        </div>

        <button class="joker-btn" id="joker" onclick="useJoker()">🃏 50/50 Jokerini Kullan</button>
    </div>

    <div id="end-ui" class="full-screen hidden">
        <h2 style="color: var(--purple);">Ünite Tamamlandı!</h2>
        <h1 id="final-score" style="font-size: 60px; margin: 10px 0;">0</h1>
        <p id="accuracy-text">Başarı Oranı: %100</p>
        <div id="mistakes-box" style="text-align: left; background: #fff5f5; padding: 15px; border-radius: 15px; width: 100%; max-height: 200px; overflow-y: auto; margin-top: 15px; font-size: 14px;">
            <b>Geliştirmen Gerekenler:</b><br>
        </div>
        <button onclick="location.reload()" style="margin-top: 25px; padding: 15px 40px; border-radius: 15px; border: none; background: var(--blue); color: white; font-weight: bold; cursor: pointer;">TEKRAR DENE</button>
    </div>
</div>

<script>
    const words = [
        {en: "Honest", tr: "dürüst"}, {en: "Generous", tr: "cömert"}, {en: "Reliable", tr: "güvenilir"},
        {en: "Adventurous", tr: "maceracı"}, {en: "Stubborn", tr: "inatçı"}, {en: "Amusing", tr: "eğlenceli"},
        {en: "Arrogant", tr: "kibirli"}, {en: "Selfish", tr: "bencil"}, {en: "Sneaky", tr: "sinsi"},
        {en: "Loyal", tr: "sadık"}, {en: "Tactful", tr: "nazik"}, {en: "Fair", tr: "adil"},
        {en: "Buddy", tr: "kanka"}, {en: "Back up", tr: "desteklemek"}, {en: "Count on", tr: "güvenmek"},
        {en: "Get on well", tr: "iyi geçinmek"}, {en: "Accept", tr: "kabul etmek"}, {en: "Refuse", tr: "reddetmek"},
        {en: "Invite", tr: "davet etmek"}, {en: "Stranger", tr: "yabancı"}, {en: "Awesome", tr: "harika"},
        {en: "Exhibition", tr: "sergi"}, {en: "Tournament", tr: "turnuva"}, {en: "Fee", tr: "ücret"},
        {en: "Reunion", tr: "yeniden buluşma"}, {en: "Calm", tr: "sakin"}, {en: "Cool", tr: "havalı"},
        {en: "Exciting", tr: "heyecan verici"}, {en: "Fashionable", tr: "modaya uygun"}, {en: "Terrific", tr: "müthiş"},
        {en: "Unbearable", tr: "katlanılmaz"}, {en: "Healthy", tr: "sağlıklı"}, {en: "Casual", tr: "günlük"},
        {en: "Impressive", tr: "etkileyici"}, {en: "Trendy", tr: "trend"}, {en: "Skilled", tr: "yetenekli"},
        {en: "Harmful", tr: "zararlı"}, {en: "Ridiculous", tr: "saçma"}, {en: "Serious", tr: "ciddi"},
        {en: "Success", tr: "başarı"}, {en: "Goal", tr: "hedef"}, {en: "Dream", tr: "hayal"},
        {en: "Lazy", tr: "tembel"}, {en: "Punctual", tr: "dakik"}
    ];

    let current = 0, score = 0, streak = 0, level = 1, lives = 3, timeLeft = 100;
    let timer, mistakes = [], jokerUsed = false;

    document.getElementById('hs-val').innerText = localStorage.getItem('miranHS') || 0;

    function startGame() {
        document.getElementById('start-ui').classList.add('hidden');
        document.getElementById('game-ui').classList.remove('hidden');
        words.sort(() => Math.random() - 0.5);
        next();
    }

    function next() {
        if(current >= words.length) { finish(); return; }
        
        clearInterval(timer);
        timeLeft = 100;
        startTimer();

        document.getElementById('q-count').innerText = `Soru ${current + 1}/${words.length}`;
        document.getElementById('target-word').innerText = words[current].en;
        
        // Şıkları hazırla
        let opts = [words[current].tr];
        while(opts.length < 4) {
            let r = words[Math.floor(Math.random()*words.length)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'opt';
            b.innerText = o;
            b.onclick = () => check(b, o === words[current].tr);
            grid.appendChild(b);
        });
    }

    function startTimer() {
        timer = setInterval(() => {
            timeLeft -= 1.2;
            document.getElementById('timer-bar').style.width = timeLeft + "%";
            if(timeLeft <= 0) { showCombo("SÜRE BİTTİ!"); current++; next(); }
        }, 100);
    }

    function check(btn, isCorrect) {
        clearInterval(timer);
        const btns = document.querySelectorAll('.opt');
        btns.forEach(b => b.style.pointerEvents = 'none');

        if(isCorrect) {
            btn.classList.add('correct');
            let points = 10;
            if(timeLeft > 80) { points *= 2; showCombo("KRİTİK VURUŞ! X2"); }
            else if(streak > 3) { showCombo("DURDURULAMAZ!"); }
            
            score += points;
            streak++;
            confetti({ particleCount: 30, origin: { y: 0.8 } });
        } else {
            btn.classList.add('wrong');
            streak = 0;
            mistakes.push(words[current]);
            btns.forEach(b => { if(b.innerText === words[current].tr) b.classList.add('correct'); });
        }

        document.getElementById('score').innerText = score;
        document.getElementById('streak').innerText = streak;
        
        // Seviye atlama kontrolü
        if(current % 5 === 0 && current !== 0) { 
            level++; 
            document.getElementById('level-pill').innerText = "Lv. " + level;
            document.body.style.background = `linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%)`;
        }

        current++;
        setTimeout(next, 900);
    }

    function useJoker() {
        if(jokerUsed) return;
        jokerUsed = true;
        document.getElementById('joker').disabled = true;
        const btns = document.querySelectorAll('.opt');
        let count = 0;
        btns.forEach(b => {
            if(b.innerText !== words[current].tr && count < 2) {
                b.style.opacity = '0.2';
                b.style.pointerEvents = 'none';
                count++;
            }
        });
    }

    function showCombo(txt) {
        const el = document.getElementById('combo-msg');
        el.innerText = txt;
        el.classList.remove('pop');
        void el.offsetWidth; // Reset animation
        el.classList.add('pop');
    }

    function finish() {
        document.getElementById('game-ui').classList.add('hidden');
        document.getElementById('end-ui').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        
        let hs = localStorage.getItem('miranHS') || 0;
        if(score > hs) localStorage.setItem('miranHS', score);

        const mBox = document.getElementById('mistakes-box');
        if(mistakes.length > 0) {
            mistakes.forEach(m => {
                mBox.innerHTML += `<p>❌ ${m.en} = ${m.tr}</p>`;
            });
        } else {
            mBox.innerHTML = "🎉 Hiç hata yapmadın, mükemmelsin!";
        }
        confetti({ particleCount: 200, spread: 100 });
    }
</script>
</body>
</html>
