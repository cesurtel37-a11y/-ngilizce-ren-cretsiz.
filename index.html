<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiranLingo v12</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #58cc02; --s: #1cb0f6; --r: #ff4b4b; --w: #ffffff; --t: #4b4b4b; --bg: #f7f8fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); color: var(--t); overflow: hidden; display: flex; justify-content: center; }
        
        .container { width: 100%; max-width: 414px; height: 100vh; position: relative; background: var(--bg); }
        .page { position: absolute; inset: 0; padding: 20px; display: none; flex-direction: column; overflow-y: auto; }
        .active { display: flex; }

        /* UI Elemanları */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .xp-pill { background: var(--s); color: white; padding: 5px 15px; border-radius: 20px; font-weight: 900; }
        
        .unit-card { 
            background: var(--w); border: 2px solid #e5e5e5; border-bottom: 6px solid #e5e5e5;
            border-radius: 20px; padding: 20px; margin-bottom: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }

        .mode-card {
            background: var(--w); border: 2px solid #e5e5e5; border-bottom: 5px solid #e5e5e5;
            border-radius: 18px; padding: 20px; margin-bottom: 12px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; font-weight: 900;
        }

        /* Oyun Alanı */
        .progress-bar { width: 100%; height: 12px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--p); transition: 0.3s; }
        
        .q-card { 
            background: var(--w); border: 2px solid #eee; border-bottom: 5px solid #eee;
            border-radius: 24px; padding: 40px 10px; text-align: center; margin-bottom: 20px;
        }
        .q-text { font-size: 36px; font-weight: 900; color: #333; margin: 10px 0; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { 
            background: var(--w); border: 2px solid #e5e5e5; border-bottom: 4px solid #e5e5e5;
            border-radius: 15px; padding: 18px 5px; font-weight: 800; cursor: pointer;
        }
        .correct { background: #d7ffb8 !important; border-color: var(--p) !important; }
        .wrong { background: #ffdfe0 !important; border-color: var(--r) !important; }

        /* Alt Panel */
        #panel { 
            position: fixed; bottom: -200px; left: 0; right: 0; background: var(--w);
            padding: 25px; border-top: 3px solid #eee; transition: 0.3s; z-index: 1000; text-align: center;
        }
        #panel.show { bottom: 0; }
        .main-btn { 
            background: var(--p); color: white; border: none; padding: 15px;
            border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer;
            box-shadow: 0 5px 0 #46a302; font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <div id="home" class="page active">
        <div class="header">
            <h1 style="color: var(--p); margin: 0;">MiranLingo</h1>
            <div class="xp-pill">💎 <span id="xp-val">0</span></div>
        </div>
        <div id="unit-list"></div>
    </div>

    <div id="mode-select" class="page">
        <div onclick="showPage('home')" style="cursor:pointer; font-size:24px; margin-bottom:20px;">✕</div>
        <h2 id="unit-title">Ünite</h2>
        <div class="mode-card" onclick="startMod('learn')"><span>📖</span> Kelime Öğren</div>
        <div class="mode-card" onclick="startMod('quiz')"><span>📝</span> Soru Çöz</div>
        <div class="mode-card" onclick="startMod('listen')"><span>🎧</span> Dinle ve Bul</div>
    </div>

    <div id="game" class="page">
        <div class="progress-bar"><div id="fill"></div></div>
        <div class="q-card">
            <p id="mod-name" style="color:var(--s); font-weight:900; margin:0;"></p>
            <h2 class="q-text" id="q-val">Word</h2>
            <div id="speaker" onclick="say()" style="cursor:pointer; color:var(--s); font-weight:bold; display:none;">🔊 Dinle</div>
        </div>
        <div class="options" id="opt-grid"></div>
    </div>

    <div id="panel">
        <h3 id="panel-msg">Harika!</h3>
        <button class="main-btn" id="next-btn">DEVAM ET</button>
    </div>
</div>

<script>
    const data = [
        { id:1, name:"Friendship", icon:"🤝", xp:0, words:[{e:"Honest",t:"Dürüst"},{e:"Generous",t:"Cömert"},{e:"Reliable",t:"Güvenilir"},{e:"Stubborn",t:"İnatçı"}] },
        { id:2, name:"Teen Life", icon:"🎧", xp:100, words:[{e:"Trendy",t:"Modaya Uygun"},{e:"Casual",t:"Günlük"},{e:"Unbearable",t:"Katlanılmaz"},{e:"Terrific",t:"Müthiş"}] },
        { id:3, name:"Kitchen", icon:"🍳", xp:250, words:[{e:"Chop",t:"Doğramak"},{e:"Peel",t:"Soymak"},{e:"Whisk",t:"Çırpmak"},{e:"Sour",t:"Ekşi"}] }
    ];

    let user = JSON.parse(localStorage.getItem('miranV12')) || { xp: 0 };
    let activeUnit = null, activeMod = '', current = 0, quizWords = [];

    function init() {
        document.getElementById('xp-val').innerText = user.xp;
        const list = document.getElementById('unit-list');
        list.innerHTML = '';
        data.forEach(u => {
            const locked = user.xp < u.xp;
            const div = document.createElement('div');
            div.className = `unit-card ${locked ? 'locked' : ''}`;
            div.onclick = () => { if(!locked) { activeUnit = u; showPage('mode-select'); document.getElementById('unit-title').innerText = u.name; } };
            div.innerHTML = `<div style="font-size:30px;">${u.icon}</div><div style="flex:1"><b>${u.name}</b><br><small>${locked ? u.xp+' XP Gerekli' : 'Hazır'}</small></div><div>${locked?'🔒':'▶️'}</div>`;
            list.appendChild(div);
        });
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function startMod(mod) {
        activeMod = mod; current = 0;
        quizWords = [...activeUnit.words].sort(() => Math.random() - 0.5);
        showPage('game');
        load();
    }

    function load() {
        if(current >= quizWords.length) { confetti({particleCount:150}); showPage('home'); init(); return; }
        
        const q = quizWords[current];
        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        document.getElementById('panel').classList.remove('show');
        document.getElementById('fill').style.width = (current / quizWords.length) * 100 + "%";
        document.getElementById('speaker').style.display = (activeMod === 'learn' || activeMod === 'listen') ? 'block' : 'none';

        if(activeMod === 'learn') {
            document.getElementById('mod-name').innerText = "ÖĞRENİYORUZ";
            document.getElementById('q-val').innerText = q.e + " = " + q.t;
            const b = document.createElement('button'); b.className = 'main-btn'; b.innerText = "SIRADAKİ";
            b.onclick = () => { current++; load(); }; grid.appendChild(b); say();
        } else {
            document.getElementById('mod-name').innerText = activeMod === 'quiz' ? "TEST ÇÖZ" : "DİNLE VE BUL";
            document.getElementById('q-val').innerText = activeMod === 'quiz' ? q.e : "???";
            if(activeMod === 'listen') say();

            let opts = [q.t].concat(data[0].words.map(w=>w.t).filter(t=>t!==q.t).slice(0,3));
            opts.sort(()=>Math.random()-0.5).forEach(o => {
                const b = document.createElement('button'); b.className = 'opt'; b.innerText = o;
                b.onclick = () => check(b, o === q.t); grid.appendChild(b);
            });
        }
    }

    function check(btn, isCorrect) {
        document.querySelectorAll('.opt').forEach(b => b.style.pointerEvents = 'none');
        const p = document.getElementById('panel');
        if(isCorrect) { btn.classList.add('correct'); user.xp += 15; localStorage.setItem('miranV12', JSON.stringify(user)); }
        else { btn.classList.add('wrong'); }
        p.classList.add('show');
        document.getElementById('next-btn').onclick = () => { current++; load(); };
    }

    function say() {
        const u = new SpeechSynthesisUtterance(quizWords[current].e);
        u.lang = 'en-US'; window.speechSynthesis.speak(u);
    }

    init();
</script>
</body>
</html>
