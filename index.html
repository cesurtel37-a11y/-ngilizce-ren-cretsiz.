<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MiranLingo - Bölümler</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --p: #58cc02; --s: #1cb0f6; --r: #ff4b4b; --w: #ffffff; --t: #4b4b4b; --bg: #f7f8fa; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: var(--bg); display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        
        .app { width: 100%; max-width: 414px; height: 100%; display: flex; flex-direction: column; position: relative; }
        
        /* Ana Sayfa (Harita) */
        #home-screen { padding: 20px; overflow-y: auto; flex-grow: 1; padding-bottom: 80px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-size: 24px; font-weight: 900; color: #333; }
        .xp-badge { background: var(--s); color: white; padding: 4px 12px; border-radius: 15px; font-weight: bold; font-size: 14px; }

        .unit-card {
            background: white; border: 2px solid #e5e5e5; border-bottom: 6px solid #e5e5e5;
            border-radius: 20px; padding: 20px; margin-bottom: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 15px; transition: 0.2s;
        }
        .unit-card.locked { opacity: 0.6; filter: grayscale(1); cursor: not-allowed; }
        .unit-icon { font-size: 40px; background: #eee; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; border-radius: 15px; }
        .unit-info { flex-grow: 1; }
        .unit-title { font-weight: 900; font-size: 18px; color: #333; }
        .unit-subtitle { font-size: 12px; color: #999; font-weight: bold; }

        /* Oyun Ekranı */
        #game-screen { padding: 20px; display: flex; flex-direction: column; height: 100%; background: white; z-index: 100; }
        .nav-back { font-size: 24px; cursor: pointer; color: #ccc; margin-bottom: 10px; }
        .progress-bar { width: 100%; height: 12px; background: #eee; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #bar-fill { width: 0%; height: 100%; background: var(--p); transition: 0.4s; }

        .quiz-area { flex-grow: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .q-card { border: 2px solid #eee; border-bottom: 5px solid #eee; border-radius: 20px; padding: 40px 20px; width: 100%; text-align: center; margin-bottom: 20px; }
        .q-word { font-size: 36px; font-weight: 900; color: #333; }

        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .opt { background: white; border: 2px solid #e5e5e5; border-bottom: 4px solid #e5e5e5; border-radius: 15px; padding: 18px 5px; font-weight: bold; cursor: pointer; }
        .opt.correct { background: #d7ffb8; border-color: var(--p); }
        .opt.wrong { background: #ffdfe0; border-color: var(--r); }

        /* Footer Panel */
        #panel { position: fixed; bottom: -150px; left: 0; right: 0; background: white; padding: 20px; border-top: 3px solid #eee; transition: 0.3s; z-index: 200; text-align: center; }
        #panel.active { bottom: 0; }
        .btn { background: var(--p); color: white; border: none; padding: 15px; border-radius: 15px; font-weight: 900; width: 100%; cursor: pointer; box-shadow: 0 5px 0 #46a302; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div class="app">
    <div id="home-screen">
        <div class="header">
            <div class="user-info">
                <span class="user-subtitle">TEKRAR HOŞ GELDİN</span>
                <span class="user-name" id="display-name">Miran</span>
            </div>
            <div class="xp-badge">💎 <span id="display-xp">0</span> XP</div>
        </div>

        <div id="unit-list">
            </div>
    </div>

    <div id="game-screen" class="hidden">
        <div class="nav-back" onclick="goHome()">✕</div>
        <div class="progress-bar"><div id="bar-fill"></div></div>
        
        <div class="quiz-area">
            <div class="q-card">
                <p style="color:var(--s); font-weight:bold; margin:0;">BU KELİME NEDİR?</p>
                <h2 class="q-word" id="q-word">Word</h2>
                <div onclick="speak()" style="color:var(--s); cursor:pointer; font-size:14px; font-weight:bold;">🔊 DİNLE</div>
            </div>
            <div class="options" id="opt-grid"></div>
        </div>
    </div>

    <div id="panel">
        <h2 id="msg">Harika!</h2>
        <button class="btn" id="btn-next">DEVAM ET</button>
    </div>
</div>

<script>
    const units = [
        { id: 1, title: "Friendship", icon: "🤝", minXP: 0, words: [
            {en:"Honest", tr:"Dürüst"}, {en:"Reliable", tr:"Güvenilir"}, {en:"Generous", tr:"Cömert"}, {en:"Back up", tr:"Desteklemek"}
        ]},
        { id: 2, title: "Teen Life", icon: "🎧", minXP: 50, words: [
            {en:"Trendy", tr:"Modaya Uygun"}, {en:"Unbearable", tr:"Katlanılmaz"}, {en:"Terrific", tr:"Müthiş"}, {en:"Casual", tr:"Günlük"}
        ]},
        { id: 3, title: "In The Kitchen", icon: "🍳", minXP: 150, words: [
            {en:"Chop", tr:"Doğramak"}, {en:"Peel", tr:"Soymak"}, {en:"Sour", tr:"Ekşi"}, {en:"Whisk", tr:"Çırpmak"}
        ]},
        { id: 4, title: "On The Phone", icon: "📱", minXP: 300, words: [
            {en:"Connect", tr:"Bağlanmak"}, {en:"Hang up", tr:"Kapatmak"}, {en:"Memo", tr:"Not"}, {en:"Engaged", tr:"Meşgul"}
        ]}
    ];

    let user = JSON.parse(localStorage.getItem('miranLingoV10')) || { name: "Miran", xp: 0 };
    let currentUnit = null;
    let currentWordIdx = 0;
    let quizSet = [];

    function init() {
        document.getElementById('display-name').innerText = user.name;
        document.getElementById('display-xp').innerText = user.xp;
        renderUnits();
    }

    function renderUnits() {
        const list = document.getElementById('unit-list');
        list.innerHTML = '';
        units.forEach(u => {
            const isLocked = user.xp < u.minXP;
            const div = document.createElement('div');
            div.className = `unit-card ${isLocked ? 'locked' : ''}`;
            div.onclick = () => !isLocked && startUnit(u);
            div.innerHTML = `
                <div class="unit-icon">${u.icon}</div>
                <div class="unit-info">
                    <div class="unit-title">${u.title}</div>
                    <div class="unit-subtitle">${isLocked ? u.minXP + ' XP Gerekli' : 'Öğrenmeye Hazır'}</div>
                </div>
                <div>${isLocked ? '🔒' : '▶️'}</div>
            `;
            list.appendChild(div);
        });
    }

    function startUnit(unit) {
        currentUnit = unit;
        currentWordIdx = 0;
        quizSet = [...unit.words].sort(() => Math.random() - 0.5);
        document.getElementById('home-screen').classList.add('hidden');
        document.getElementById('game-screen').classList.remove('hidden');
        loadWord();
    }

    function loadWord() {
        if(currentWordIdx >= quizSet.length) {
            confetti({ particleCount: 150, spread: 70 });
            alert(`${currentUnit.title} Ünitesini Bitirdin!`);
            goHome();
            return;
        }
        const q = quizSet[currentWordIdx];
        document.getElementById('q-word').innerText = q.en;
        speak();

        let opts = [q.tr];
        while(opts.length < 4) {
            let r = units[Math.floor(Math.random()*units.length)].words[Math.floor(Math.random()*4)].tr;
            if(!opts.includes(r)) opts.push(r);
        }
        opts.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('opt-grid');
        grid.innerHTML = '';
        opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt';
            btn.innerText = o;
            btn.onclick = () => check(btn, o === q.tr);
            grid.appendChild(btn);
        });
        document.getElementById('panel').classList.remove('active');
        document.getElementById('bar-fill').style.width = (currentWordIdx / quizSet.length) * 100 + "%";
    }

    function check(btn, isCorrect) {
        const p = document.getElementById('panel'), m = document.getElementById('msg');
        document.querySelectorAll('.opt').forEach(b => b.style.pointerEvents = 'none');

        if(isCorrect) {
            btn.classList.add('correct');
            p.style.backgroundColor = "#d7ffb8";
            m.innerText = "Mükemmel!";
            m.style.color = "#46a302";
            user.xp += 15;
            save();
        } else {
            btn.classList.add('wrong');
            p.style.backgroundColor = "#ffdfe0";
            m.innerText = "Doğrusu: " + quizSet[currentWordIdx].tr;
            m.style.color = "#ff4b4b";
        }
        p.classList.add('active');
        document.getElementById('btn-next').onclick = () => { currentWordIdx++; loadWord(); };
    }

    function goHome() {
        document.getElementById('game-screen').classList.add('hidden');
        document.getElementById('home-screen').classList.remove('hidden');
        document.getElementById('panel').classList.remove('active');
        init();
    }

    function save() {
        localStorage.setItem('miranLingoV10', JSON.stringify(user));
    }

    function speak() {
        const u = new SpeechSynthesisUtterance(quizSet[currentWordIdx].en);
        u.lang = 'en-US';
        window.speechSynthesis.speak(u);
    }

    init();
</script>
</body>
</html>
